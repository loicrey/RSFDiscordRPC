name = "rsfdiscordrpc"
main = "src/worker.js"
compatibility_date = "2026-04-10"
workers_dev = false
preview_urls = false

[assets]
directory = "./assets"
binding = "ASSETS"
run_worker_first = ["/images/cars/*.jpg", "/images/stages/*.jpg"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[env.preview]
workers_dev = true
preview_urls = true

[env.preview.assets]
directory = "./assets"
binding = "ASSETS"
run_worker_first = ["/images/cars/*.jpg", "/images/stages/*.jpg"]

[env.preview.observability]
enabled = false
head_sampling_rate = 1

[env.preview.observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[env.preview.observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
